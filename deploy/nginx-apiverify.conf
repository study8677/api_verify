# /etc/nginx/sites-available/apiverify.aidcmo.com.conf
# Plain HTTP block only. certbot --nginx will inject the HTTPS server block.

server {
    listen 80;
    listen [::]:80;
    server_name apiverify.aidcmo.com;

    # client body limits: API keys + small JSON only
    client_max_body_size 16k;

    # logs
    access_log /var/log/nginx/apiverify.access.log;
    error_log  /var/log/nginx/apiverify.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # probes can run up to ~60s
        proxy_read_timeout 90s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
